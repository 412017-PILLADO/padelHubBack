services:
  mysql:
    image: mysql:8.4
    container_name: padel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: padeldb
      MYSQL_USER: padel
      MYSQL_PASSWORD: padel
    ports:
      - "3308:3306"
    volumes:
      - padel-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  padel-mysql-data:
